name: Scheduled Backup

# 프로덕션 DB(pg_dump) + 첨부파일(uploads)을 서버 로컬로 백업하고 보존기간을 관리한다.
# 스크립트는 서버로 복사 후 실행하므로 이 워크플로만으로 자체 완결된다.
#
# 주의: 이 백업은 서버 로컬($BACKUP_DIR)에 저장된다. 디스크 물리 장애까지 대비하려면
#   오프호스트 복제가 필요하다(scripts/backup.sh 의 OFFSITE_CMD 훅 또는
#   docs/backup-and-restore.md 의 rclone/S3 예시 참고).

on:
  schedule:
    # 매일 UTC 18:00 = KST 03:00
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      retention_days:
        description: '백업 보존 일수'
        required: false
        default: '14'

permissions:
  contents: read

concurrency:
  group: backup
  cancel-in-progress: false

jobs:
  backup:
    name: DB + uploads backup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy backup scripts to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          port: 22
          source: 'scripts/backup.sh,scripts/restore.sh'
          target: '/home/opc/sr'

      - name: Run backup on server
        uses: appleboy/ssh-action@v1.0.3
        env:
          RETENTION_DAYS: ${{ github.event.inputs.retention_days || '14' }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          port: 22
          envs: RETENTION_DAYS
          script: |
            set -e
            cd /home/opc/sr
            sed -i 's/\r$//' scripts/backup.sh scripts/restore.sh
            chmod +x scripts/backup.sh scripts/restore.sh
            RETENTION_DAYS="$RETENTION_DAYS" bash scripts/backup.sh
