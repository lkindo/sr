name: E2E

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_url:
        description: '테스트 대상 BASE_URL (미지정 시 로컬 dev)'
        required: false
        default: ''
  pull_request:
    types: [labeled]

jobs:
  e2e:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'e2e'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - name: Start dev server (if BASE_URL not provided)
        if: ${{ inputs.base_url == '' }}
        run: |
          pnpm dev &
          npx wait-on http://localhost:3000
      - name: Run E2E tests
        env:
          BASE_URL: ${{ inputs.base_url }}
          SKIP_WEBSERVER: ${{ inputs.base_url != '' && '1' || '' }}
        run: pnpm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
