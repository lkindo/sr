name: Deploy to Self-Hosted Docker Server

on:
  push:
    branches:
      - main
      - dev

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 이미지 이름 소문자 변환 처리 (GitHub 레포지토리 주소 전체를 소문자로 변환)
      - name: Convert Repository Name to Lowercase
        id: string
        run: |
          echo "image_name_lc=${GITHUB_REPOSITORY,,}" >> ${GITHUB_OUTPUT}
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Set Env Tags
        id: tags
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "tag=latest" >> ${GITHUB_OUTPUT}
          else
            echo "tag=dev" >> ${GITHUB_OUTPUT}
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.string.outputs.image_name_lc }}:${{ steps.tags.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # SSH를 이용해 대상 서버로 배포 원격 실행
      - name: Deploy to Remote VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          port: 22
          script: |
            mkdir -p /home/opc/sr/nginx/certs
            cd /home/opc/sr
            
            # 1. 방화벽 443 포트 해제
            sudo firewall-cmd --permanent --add-port=443/tcp || true
            sudo firewall-cmd --reload || true
            
            # 2. 자가 서명 인증서 자동 생성 (certs 하위에 파일 없을 때만 발급)
            if [ ! -f nginx/certs/server.crt ]; then
              echo "Generating self-signed SSL certificate..."
              sudo openssl req -x509 -nodes -days 730 -newkey rsa:2048 \
                -keyout nginx/certs/server.key \
                -out nginx/certs/server.crt \
                -subj "/C=KR/ST=Seoul/L=Seoul/O=SR/CN=134.185.106.129"
              sudo chmod 644 nginx/certs/server.crt
              sudo chmod 600 nginx/certs/server.key
            fi
            
            # 3. nginx/nginx.conf 동기화
            cat << 'EOF' > nginx/nginx.conf
            user nginx;
            worker_processes auto;
            error_log /var/log/nginx/error.log warn;
            pid /var/run/nginx.pid;

            events {
                worker_connections 1024;
            }

            http {
                include /etc/nginx/mime.types;
                default_type application/octet-stream;

                log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                                '$status $body_bytes_sent "$http_referer" '
                                '"$http_user_agent" "$http_x_forwarded_for"';

                access_log /var/log/nginx/access.log main;

                sendfile on;
                tcp_nopush on;
                tcp_nodelay on;
                keepalive_timeout 65;
                types_hash_max_size 2048;

                gzip on;
                gzip_disable "msie6";
                gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

                server {
                    listen 80;
                    listen [::]:80;
                    server_name _;

                    location /.well-known/acme-challenge/ {
                        root /usr/share/nginx/html;
                    }

                    location / {
                        return 301 https://$host$request_uri;
                    }
                }

                server {
                    listen 443 ssl;
                    listen [::]:443 ssl;
                    server_name _;

                    ssl_certificate /etc/nginx/certs/server.crt;
                    ssl_certificate_key /etc/nginx/certs/server.key;

                    ssl_protocols TLSv1.2 TLSv1.3;
                    ssl_prefer_server_ciphers on;
                    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

                    location / {
                        proxy_pass http://app:3000;
                        proxy_http_version 1.1;
                        proxy_set_header Upgrade $http_upgrade;
                        proxy_set_header Connection 'upgrade';
                        proxy_set_header Host $host;
                        proxy_cache_bypass $http_upgrade;
                        proxy_set_header X-Real-IP $remote_addr;
                        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                        proxy_set_header X-Forwarded-Proto $scheme;
                        proxy_set_header X-Forwarded-Host $host;
                        proxy_set_header X-Forwarded-Port $server_port;

                        client_max_body_size 10m;
                    }
                }
            }
            EOF
            
            # 4. docker-compose.prod.yml 동기화 (Nginx 서비스 추가 및 네트워크 MTU 1400 포함)
            cat << 'EOF' > docker-compose.prod.yml
            services:
              nginx:
                image: nginx:alpine
                container_name: sr-nginx
                restart: always
                ports:
                  - '80:80'
                  - '443:443'
                volumes:
                  - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
                  - ./nginx/certs:/etc/nginx/certs:ro
                depends_on:
                  - app
                networks:
                  - sr-net

              app:
                image: ghcr.io/lkindo/sr:latest
                container_name: sr-app
                restart: always
                expose:
                  - '3000'
                env_file:
                  - .env.docker
                depends_on:
                  db:
                    condition: service_healthy
                networks:
                  - sr-net

              db:
                image: postgres:16-alpine
                container_name: sr-db
                restart: always
                environment:
                  - POSTGRES_USER=lkind
                  - POSTGRES_PASSWORD=sr1234
                  - POSTGRES_DB=sr_db
                ports:
                  - '5432:5432'
                volumes:
                  - sr_db_data:/var/lib/postgresql/data
                healthcheck:
                  test: ['CMD-SHELL', 'pg_isready -U lkind -d sr_db']
                  interval: 10s
                  timeout: 5s
                  retries: 5
                networks:
                  - sr-net

            volumes:
              sr_db_data:

            networks:
              sr-net:
                driver: bridge
                driver_opts:
                  com.docker.network.driver.mtu: 1400
            EOF
            
            # 5. GHCR 로그인 및 최신 이미지 Pull
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull
            
            # 6. 전체 컨테이너 삭제 및 재생성 (Nginx 서비스 및 MTU 변경사항 완벽 반영)
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d
            
            # 6.5. 데이터베이스 마이그레이션 및 시딩 자동화 (Swap 4GB 및 버닝 방지 버전 고정)
            docker exec -i sr-app npx prisma@6.19.0 db push --accept-data-loss
            docker exec -i sr-app npx tsx prisma/seed.ts
            
            # 7. 미사용 도커 이미지 정리 (디스크 부족 방지)
            docker compose -f docker-compose.prod.yml image prune -af || docker image prune -af
