name: Deploy to Self-Hosted Docker Server

on:
  push:
    branches:
      - main
      - dev

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 이미지 이름 소문자 변환 처리 (GitHub 레포지토리 주소 전체를 소문자로 변환)
      - name: Convert Repository Name to Lowercase
        id: string
        run: |
          echo "image_name_lc=${GITHUB_REPOSITORY,,}" >> ${GITHUB_OUTPUT}
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Set Env Tags
        id: tags
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "tag=latest" >> ${GITHUB_OUTPUT}
          else
            echo "tag=dev" >> ${GITHUB_OUTPUT}
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.string.outputs.image_name_lc }}:${{ steps.tags.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # SSH를 이용해 대상 서버로 배포 원격 실행
      - name: Deploy to Remote VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          port: 22
          script: |
            mkdir -p /home/opc/sr
            cd /home/opc/sr
            
            # docker-compose.prod.yml 동기화 (네트워크 MTU 1400 포함)
            cat << 'EOF' > docker-compose.prod.yml
            services:
              app:
                image: ghcr.io/lkindo/sr:latest
                container_name: sr-app
                restart: always
                ports:
                  - '80:3000'
                env_file:
                  - .env.docker
                depends_on:
                  db:
                    condition: service_healthy
                networks:
                  - sr-net

              db:
                image: postgres:16-alpine
                container_name: sr-db
                restart: always
                environment:
                  - POSTGRES_USER=lkind
                  - POSTGRES_PASSWORD=sr1234
                  - POSTGRES_DB=sr_db
                ports:
                  - '5432:5432'
                volumes:
                  - sr_db_data:/var/lib/postgresql/data
                healthcheck:
                  test: ['CMD-SHELL', 'pg_isready -U lkind -d sr_db']
                  interval: 10s
                  timeout: 5s
                  retries: 5
                networks:
                  - sr-net

            volumes:
              sr_db_data:

            networks:
              sr-net:
                driver: bridge
                driver_opts:
                  com.docker.network.driver.mtu: 1400
            EOF
            
            # GHCR 로그인 및 최신 이미지 Pull
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull
            
            # 컨테이너 및 네트워크 완전 삭제 후 재생성 (MTU 변경사항 반영 목적)
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d
            
            # 미사용 도커 이미지 정리 (디스크 부족 방지)
            docker compose -f docker-compose.prod.yml image prune -af || docker image prune -af
