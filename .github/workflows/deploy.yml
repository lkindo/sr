name: Deploy to Self-Hosted Docker Server

on:
  push:
    branches:
      - main
      - dev

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 이미지 이름 소문자 변환 처리 (GitHub 레포지토리 주소 전체를 소문자로 변환)
      - name: Convert Repository Name to Lowercase
        id: string
        run: |
          echo "image_name_lc=${GITHUB_REPOSITORY,,}" >> ${GITHUB_OUTPUT}
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Set Env Tags
        id: tags
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "tag=latest" >> ${GITHUB_OUTPUT}
          else
            echo "tag=dev" >> ${GITHUB_OUTPUT}
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.string.outputs.image_name_lc }}:${{ steps.tags.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copy Config Files to Remote VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          port: 22
          source: ".env.docker.test,docker-compose.test.yml,docker-compose.prod.yml,nginx/nginx.conf,scripts/setup-letsencrypt.sh"
          target: "/home/opc/sr"

      # SSH를 이용해 대상 서버로 배포 원격 실행
      - name: Deploy to Remote VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          port: 22
          envs: BRANCH_NAME, GITHUB_ACTOR
          script: |
            mkdir -p /home/opc/sr/nginx/certs /home/opc/sr/scripts
            cd /home/opc/sr
            
            # GITHUB_TOKEN으로 도커 레포지토리 로그인 (sudo 권한 전달)
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u $GITHUB_ACTOR --password-stdin

            if [ "$BRANCH_NAME" = "dev" ]; then
              echo "Deploying Staging (dev branch)..."
              
              # 1. Pull 최신 dev 이미지 및 재시작
              docker compose -p sr-test -f docker-compose.test.yml pull
              docker compose -p sr-test -f docker-compose.test.yml down
              docker compose -p sr-test -f docker-compose.test.yml up -d

              # 2. DB 마이그레이션 및 시딩 (프로젝트 지정 exec 방식 적용)
              docker compose -p sr-test exec -T app-test npx prisma@6.19.0 db push --accept-data-loss
              docker compose -p sr-test exec -T app-test npx tsx prisma/seed.ts
              
              # 3. 미사용 이미지 prune
              docker compose -p sr-test -f docker-compose.test.yml image prune -af || docker image prune -af

            else
              echo "Deploying Production (main branch)..."

              # 1. 방화벽 443 포트 해제
              sudo firewall-cmd --permanent --add-port=443/tcp || true
              sudo firewall-cmd --reload || true
              
              # 2. 자가 서명 인증서 자동 생성 (certs 하위에 파일 없을 때만 발급)
              if [ ! -f nginx/certs/server.crt ]; then
                echo "Generating self-signed SSL certificate..."
                sudo openssl req -x509 -nodes -days 730 -newkey rsa:2048 \
                  -keyout nginx/certs/server.key \
                  -out nginx/certs/server.crt \
                  -subj "/C=KR/ST=Seoul/L=Seoul/O=SR/CN=134.185.106.129"
                sudo chmod 644 nginx/certs/server.crt
                sudo chmod 600 nginx/certs/server.key
              fi
              
              # 3. 최신 이미지 Pull 및 재구동
              docker compose -f docker-compose.prod.yml pull
              docker compose -f docker-compose.prod.yml down
              docker compose -f docker-compose.prod.yml up -d
              
              # 4. Let's Encrypt 발급 스크립트 실행
              chmod +x scripts/setup-letsencrypt.sh
              ./scripts/setup-letsencrypt.sh
              
              # 5. 데이터베이스 마이그레이션 및 시딩 자동화
              docker exec -i sr-app npx prisma@6.19.0 db push --accept-data-loss
              docker exec -i sr-app npx tsx prisma/seed.ts
              
              # 6. 미사용 이미지 정리
              docker compose -f docker-compose.prod.yml image prune -af || docker image prune -af
            fi
