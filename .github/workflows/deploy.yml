name: Deploy to Self-Hosted Docker Server

on:
  push:
    branches:
      - main
      - dev

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 이미지 이름 소문자 변환 처리 (GitHub 레포지토리 주소 전체를 소문자로 변환)
      - name: Convert Repository Name to Lowercase
        id: string
        run: |
          echo "image_name_lc=${GITHUB_REPOSITORY,,}" >> ${GITHUB_OUTPUT}
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Set Env Tags
        id: tags
        run: |
          if [ "${{ github.event.workflow_run.head_branch }}" = "main" ]; then
            echo "tag=latest" >> ${GITHUB_OUTPUT}
          else
            echo "tag=dev" >> ${GITHUB_OUTPUT}
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.string.outputs.image_name_lc }}:${{ steps.tags.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # SSH를 이용해 대상 서버로 배포 원격 실행
      - name: Deploy to Remote VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          port: 22
          script: |
            cd /home/opc/sr
            
            # GHCR 로그인 및 최신 이미지 Pull
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            
            # 컨테이너 롤링 리스타트
            docker compose up -d
            
            # 미사용 도커 이미지 정리 (디스크 부족 방지)
            docker image prune -af
