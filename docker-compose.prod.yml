services:
  nginx:
    image: nginx:alpine
    container_name: sr-nginx
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    depends_on:
      - app
    networks:
      - sr-net
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  app:
    image: ghcr.io/lkindo/sr:latest
    container_name: sr-app
    restart: always
    expose:
      - '3000'
    env_file:
      - .env.docker
    environment:
      - NODE_OPTIONS=--max-old-space-size=450
      # 첨부파일 저장 위치(웹루트 밖). 아래 명명 볼륨이 이 경로에 마운트된다.
      - STORAGE_DIR=/app/var/uploads
    volumes:
      # 첨부파일 영속화 (재배포 시 유실 방지 + 웹루트 밖 보관)
      - sr_uploads:/app/var/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sr-net
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  db:
    image: postgres:16-alpine
    container_name: sr-db
    restart: always
    environment:
      - POSTGRES_USER=lkind
      - POSTGRES_PASSWORD=sr1234
      - POSTGRES_DB=sr_db
    # 보안: DB 포트를 호스트로 공개하지 않는다. app 컨테이너는 내부 브리지(sr-net)로 접근한다.
    # 관리 접근이 필요하면 SSH 터널 또는 `docker exec`를 사용한다.
    # ports:
    #   - '5432:5432'
    volumes:
      - sr_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lkind -d sr_db']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sr-net
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

volumes:
  sr_db_data:
  sr_uploads:

networks:
  sr-net:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1400
